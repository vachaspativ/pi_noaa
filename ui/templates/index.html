<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pi_noaa - Weather Satellite Receiving Station</title>
    <link rel="stylesheet" href="/static/css/dashboard.css">
    
    <!-- Leaflet.js -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Socket.IO -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
    <div id="offline-banner" class="banner hidden"></div>
    <div id="alert-banner" class="banner hidden">
        <div class="ticker-wrap">
            <div class="ticker" id="alert-ticker">
                <!-- Alerts populated by JS -->
            </div>
        </div>
    </div>

    <div class="dashboard-grid">
        <main id="map-panel" class="panel">
            <div id="alert-map"></div>
        </main>
        
        <aside id="sidebar">
            <div id="status-panel" class="panel">
                <h2>System Status</h2>
                <div class="status-grid">
                    <div>Mode: <span id="status-mode" class="badge">UNKNOWN</span></div>
                    <div>SDR: <span id="status-sdr" class="badge">UNKNOWN</span></div>
                    <div>TLE: <span id="status-tle">...</span></div>
                </div>
            </div>

            <div id="countdown-panel" class="panel">
                <h2>Next Satellite Pass</h2>
                <div id="pass-countdown">
                    <div class="time-large">--:--:--</div>
                    <div class="pass-details">Waiting for data...</div>
                </div>
            </div>

            <div id="images-panel" class="panel">
                <h2>Latest Satellite Image</h2>
                <div id="image-viewer-container" style="text-align: center; position: relative;">
                    <img id="satellite-image-display" src="" alt="No image available" style="max-width: 100%; max-height: 300px; border-radius: 4px; display: none;">
                    <div id="image-placeholder" style="padding: 40px 0; color: var(--text-muted);">No images captured yet.</div>
                </div>
                <div id="layer-controls" style="margin-top: 10px; display: none; gap: 5px; justify-content: center; flex-wrap: wrap;">
                    <!-- Toggle buttons populated by JS -->
                </div>
                <div style="margin-top: 10px; font-size: 0.9em; color: var(--text-muted); text-align: center;">
                    <select id="pass-selector" style="width: 100%; background: var(--bg-dark); color: var(--text-main); border: 1px solid #444; border-radius: 4px; padding: 4px;">
                        <option value="">No passes available</option>
                    </select>
                </div>
            </div>

            <div id="alerts-panel" class="panel">
                <h2>Active Alerts</h2>
                <div class="table-container">
                    <table id="alerts-table">
                        <thead>
                            <tr>
                                <th>Severity</th>
                                <th>Event</th>
                                <th>Source</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </aside>
    </div>

    <!-- Scripts -->
    <script src="/static/js/county_lookup.js"></script>
    <script src="/static/js/alert_map.js"></script>
    <script src="/static/js/alert_banner.js"></script>
    <script src="/static/js/offline_banner.js"></script>
    <script src="/static/js/pass_clock.js"></script>
    <script src="/static/js/satellite_images.js"></script>
    <script src="/static/js/dashboard.js"></script>
</body>
</html>
